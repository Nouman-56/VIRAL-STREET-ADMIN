            if (views >= 1000000) return (views / 1000000).toFixed(1) + "M";
            if (views >= 1000) return (views / 1000).toFixed(1) + "K";
            return views + " views";
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = isError ? 'rgba(229,9,20,0.95)' : 'rgba(0,0,0,0.95)';
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2800);
        }
        
        // Real-time Firestore Listeners (Snapshot)
        function attachFirestoreListeners() {
            // Videos realtime listener
            db.collection("viral_videos").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
                currentVideos = [];
                snapshot.forEach(doc => {
                    currentVideos.push({ id: doc.id, ...doc.data() });
                });
                renderVideos();
                if (isAdminLoggedIn) renderAdminVideoList();
            }, (error) => console.error("Video snapshot error:", error));
            
            // Sliders realtime listener
            db.collection("viral_sliders").orderBy("order", "asc").onSnapshot((snapshot) => {
                currentSlides = [];
                snapshot.forEach(doc => {
                    currentSlides.push({ id: doc.id, ...doc.data() });
                });
                renderSlider();
                if (isAdminLoggedIn) renderAdminSliderList();
                if (currentSlides.length > 0 && currentSlide >= currentSlides.length) currentSlide = 0;
                updateSliderPosition();
                if (currentSlides.length > 0 && !autoSlideInterval) startAutoSlide();
            });
        }
        
        // Render Functions
        function renderVideos() {
            let filtered = [...currentVideos];
            if (currentCategory !== 'all') filtered = filtered.filter(v => v.category === currentCategory);
            if (searchQuery) filtered = filtered.filter(v => v.title && v.title.toLowerCase().includes(searchQuery.toLowerCase()));
            
            const grid = document.getElementById('videosGrid');
            if (!grid) return;
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state"><i class="fas fa-film fa-3x"></i><p>No videos found</p></div>';
                return;
            }
            
            grid.innerHTML = filtered.map(video => {
                let badgeClass = '', badgeText = '';
                if (video.category === 'premium') { badgeClass = 'badge-premium'; badgeText = 'PREMIUM FREE'; }
                else if (video.category === 'indian') { badgeClass = 'badge-indian'; badgeText = 'INDIAN'; }
                else if (video.category === 'pakistani') { badgeClass = 'badge-pakistani'; badgeText = 'PAKISTANI'; }
                else { badgeClass = 'badge-all'; badgeText = 'ALL'; }
                
                const viewsCount = video.views || 0;
                const formattedViews = formatViews(viewsCount);
                
                return `<div class="movie-card">
                    <div class="movie-thumbnail" onclick="playVideo('${video.id}')">
                        <div class="category-badge ${badgeClass}">${badgeText}</div>
                        <img src="${video.thumbnail}" alt="${video.title}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">
                        <div class="movie-overlay"><div class="play-icon"><i class="fas fa-play"></i></div></div>
                    </div>
                    <div class="movie-info">
                        <div class="movie-title" onclick="playVideo('${video.id}')">${escapeHtml(video.title)}</div>
                        <div class="movie-meta"><span class="movie-year">${video.year || '2024'}</span></div>
                        <div class="movie-views"><i class="fas fa-eye"></i> ${formattedViews}</div>
                        <div class="public-buttons">
                            <button class="play-now-btn" onclick="playVideo('${video.id}')"><i class="fas fa-play"></i> Play Now</button>
                            <button class="download-btn" onclick="downloadVideo('${video.id}', event)"><i class="fas fa-download"></i> Download</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }
        
        function renderSlider() {
            const wrapper = document.getElementById('sliderWrapper');
            if (!wrapper) return;
            
            if (currentSlides.length === 0) {
                wrapper.innerHTML = '<div class="slide"><img src="https://images.pexels.com/photos/3184338/pexels-photo-3184338.jpeg?auto=compress&cs=tinysrgb&w=1200"><div class="slide-overlay"><div class="slide-badge">WELCOME</div><div class="slide-title">VIRAL STREET</div><div class="slide-desc">Watch exclusive scandal videos</div></div></div>';
            } else {
                wrapper.innerHTML = currentSlides.map(slide => `<div class="slide"><img src="${slide.imgUrl}" onerror="this.src='https://images.pexels.com/photos/3184338/pexels-photo-3184338.jpeg?auto=compress&cs=tinysrgb&w=1200'"><div class="slide-overlay"><span class="slide-badge"><i class="fas fa-fire"></i> ${slide.badge || 'FEATURED'}</span><div class="slide-title">${escapeHtml(slide.title)}</div><div class="slide-desc">${escapeHtml(slide.desc)}</div></div></div>`).join('');
            }
            updateSliderDots();
        }
        
        function updateSliderDots() {
            const dotsContainer = document.getElementById('sliderDots');
            if (!dotsContainer) return;
            dotsContainer.innerHTML = '';
            for (let i = 0; i < currentSlides.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot' + (i === currentSlide ? ' active' : '');
                dot.addEventListener('click', () => goToSlide(i));
                dotsContainer.appendChild(dot);
            }
        }
        
        function updateSliderPosition() {
            const wrapper = document.getElementById('sliderWrapper');
            if (wrapper && currentSlides.length > 0) {
                wrapper.style.transform = `translateX(-${currentSlide * 100}%)`;
            }
            document.querySelectorAll('.dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentSlide);
            });
        }
        
        function nextSlide() { if (currentSlides.length) { currentSlide = (currentSlide + 1) % currentSlides.length; updateSliderPosition(); resetAutoSlide(); } }
        function prevSlide() { if (currentSlides.length) { currentSlide = (currentSlide - 1 + currentSlides.length) % currentSlides.length; updateSliderPosition(); resetAutoSlide(); } }
        function goToSlide(index) { currentSlide = index; updateSliderPosition(); resetAutoSlide(); }
        function startAutoSlide() { autoSlideInterval = setInterval(nextSlide, 5000); }
        function resetAutoSlide() { clearInterval(autoSlideInterval); startAutoSlide(); }
        
        // Video Actions
        async function incrementViews(videoId) {
            try {
                await db.collection("viral_videos").doc(videoId).update({
                    views: firebase.firestore.FieldValue.increment(1)
                });
            } catch (error) {
                console.error("View increment error:", error);
            }
        }
        
        async function playVideo(id) {
            const video = currentVideos.find(v => v.id === id);
            if (video) {
                await incrementViews(id);
                document.getElementById('modalTitle').innerHTML = video.title;
                document.getElementById('videoSource').src = video.videoUrl;
                document.getElementById('videoPlayer').load();
                document.getElementById('videoModal').classList.add('active');
                document.getElementById('videoPlayer').play().catch(e => console.log('Autoplay blocked'));
            }
        }
        
        function downloadVideo(videoId, event) {
            if (event) event.stopPropagation();
            const video = currentVideos.find(v => v.id === videoId);
            if (video && video.videoUrl) {
                const a = document.createElement('a');
                a.href = video.videoUrl;
                a.download = `${video.title}.mp4`;
                a.click();
                showToast(`📥 Downloading "${video.title}"...`);
            } else {
                showToast('❌ Download link not available', true);
            }
        }
        
        function closeModal() {
            document.getElementById('videoPlayer').pause();
            document.getElementById('videoModal').classList.remove('active');
        }
        
        // Admin Functions (Firestore)
        async function addVideo() {
            if (!isAdminLoggedIn) { showToast('🔒 Admin access required!', true); return; }
            const title = document.getElementById('newTitle').value.trim();
            const year = document.getElementById('newYear').value.trim();
            const category = document.getElementById('newCategory').value;
            const thumb = document.getElementById('newThumb').value.trim();
            const videoUrl = document.getElementById('newVideoUrl').value.trim();
            const initialViews = parseInt(document.getElementById('newViews').value) || 0;
            
            if (!title || !year || !thumb || !videoUrl) {
                showToast('Please fill all fields!', true);
                return;
            }
            
            await db.collection("viral_videos").add({
                title, year, category, thumbnail: thumb, videoUrl, views: initialViews,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast(`✅ "${title}" added!`);
            document.getElementById('newTitle').value = '';
            document.getElementById('newYear').value = '';
            document.getElementById('newThumb').value = '';
            document.getElementById('newVideoUrl').value = '';
            document.getElementById('newViews').value = '0';
        }
        
        async function addSlider() {
            if (!isAdminLoggedIn) { showToast('🔒 Admin access required!', true); return; }
            const imgUrl = document.getElementById('sliderImgUrl').value.trim();
            const title = document.getElementById('sliderTitle').value.trim();
            const desc = document.getElementById('sliderDesc').value.trim();
            
            if (!imgUrl || !title || !desc) {
                showToast('Please fill all slider fields!', true);
                return;
            }
            
            const count = (await db.collection("viral_sliders").get()).size;
            await db.collection("viral_sliders").add({
                imgUrl, title, desc, badge: "FEATURED", order: count,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast(`✅ Slider added!`);
            document.getElementById('sliderImgUrl').value = '';
            document.getElementById('sliderTitle').value = '';
            document.getElementById('sliderDesc').value = '';
        }
        
        async function deleteSlider(sliderId) {
            if (!isAdminLoggedIn) { showToast('🔒 Admin access required!', true); return; }
            if (confirm('Delete this slider?')) {
                await db.collection("viral_sliders").doc(sliderId).delete();
                showToast('Slider deleted');
            }
        }
        
        function openEditModal(videoId) {
            if (!isAdminLoggedIn) { showToast('🔒 Admin access required!', true); return; }
            const video = currentVideos.find(v => v.id === videoId);
            if (video) {
                document.getElementById('editVideoId').value = videoId;
                document.getElementById('editTitle').value = video.title;
                document.getElementById('editYear').value = video.year;
                document.getElementById('editCategory').value = video.category;
                document.getElementById('editThumb').value = video.thumbnail;
                document.getElementById('editVideoUrl').value = video.videoUrl;
                document.getElementById('editViews').value = video.views || 0;
                document.getElementById('editModal').classList.add('active');
            }
        }
        
        async function saveEditedVideo() {
            const id = document.getElementById('editVideoId').value;
            const updates = {
                title: document.getElementById('editTitle').value,
                year: document.getElementById('editYear').value,
                category: document.getElementById('editCategory').value,
                thumbnail: document.getElementById('editThumb').value,
                videoUrl: document.getElementById('editVideoUrl').value,
                views: parseInt(document.getElementById('editViews').value) || 0
            };
            await db.collection("viral_videos").doc(id).update(updates);
            showToast('✅ Video updated!');
            closeEditModal();
        }
        
        function closeEditModal() { document.getElementById('editModal').classList.remove('active'); }
        
        async function deleteVideo(videoId) {
            if (!isAdminLoggedIn) { showToast('🔒 Admin access required!', true); return; }
            if (confirm('Delete this video?')) {
                await db.collection("viral_videos").doc(videoId).delete();
                showToast('🗑️ Video deleted!');
            }
        }
        
        function renderAdminVideoList() {
            const container = document.getElementById('adminVideoList');
            if (!container || !isAdminLoggedIn) return;
            container.innerHTML = currentVideos.map(video => `
                <div class="admin-movie-item">
                    <span><strong>${escapeHtml(video.title)}</strong> (${video.year}) - ${video.category} | 👁️ ${formatViews(video.views || 0)}</span>
                    <div>
                        <button class="edit-movie-btn" onclick="openEditModal('${video.id}')"><i class="fas fa-edit"></i> Edit</button>
                        <button class="delete-movie" onclick="deleteVideo('${video.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        function renderAdminSliderList() {
            const container = document.getElementById('sliderListAdmin');
            if (!container || !isAdminLoggedIn) return;
            container.innerHTML = currentSlides.map(slide => `
                <div class="admin-slider-item">
                    <span><strong>${escapeHtml(slide.title)}</strong></span>
                    <button class="delete-slider" onclick="deleteSlider('${slide.id}')">Delete</button>
                </div>
            `).join('');
        }
        
        function verifyAdmin() {
            const password = document.getElementById('adminPassword').value;
            if (password === 'admin123') {
                isAdminLoggedIn = true;
                document.getElementById('adminContent').style.display = 'block';
                document.getElementById('verifyAdminBtn').style.display = 'none';
                renderAdminVideoList();
                renderAdminSliderList();
                showToast('✅ Admin access granted!');
            } else {
                showToast('❌ Wrong password! (Use: admin123)', true);
            }
        }
        
        function handleSearch() {
            searchQuery = document.getElementById('searchInput').value;
            renderVideos();
        }
        
        function renderCategories() {
            const categories = [
                { id: 'premium', name: '🔥 Premium Free' },
                { id: 'indian', name: '🇮🇳 Indian Scandals' },
                { id: 'pakistani', name: '🇵🇰 Pakistani Scandals' },
                { id: 'all', name: '📺 All Videos' }
            ];
            document.getElementById('categoriesContainer').innerHTML = categories.map(cat => 
                `<button class="cat-btn ${currentCategory === cat.id ? 'active' : ''}" data-category="${cat.id}">${cat.name}</button>`
            ).join('');
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentCategory = btn.dataset.category;
                    renderCategories();
                    renderVideos();
                    updateCategoryTitle();
                });
            });
        }
        
        function updateCategoryTitle() {
            const titles = {
                premium: '🔥 Premium Free Videos',
                indian: '🇮🇳 Indian Scandals',
                pakistani: '🇵🇰 Pakistani Scandals',
                all: '📺 All Videos'
            };
            document.getElementById('categoryTitle').innerHTML = titles[currentCategory] || 'All Videos';
        }
        
        // Event Listeners
        document.getElementById('searchBtn').addEventListener('click', handleSearch);
        document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSearch(); });
        document.getElementById('adminToggle').addEventListener('click', () => document.getElementById('adminModal').classList.add('active'));
        document.getElementById('verifyAdminBtn').addEventListener('click', verifyAdmin);
        document.getElementById('addVideoBtn').addEventListener('click', addVideo);
        document.getElementById('addSliderBtn').addEventListener('click', addSlider);
        document.getElementById('saveEditBtn').addEventListener('click', saveEditedVideo);
        document.getElementById('prevSlide').addEventListener('click', prevSlide);
        document.getElementById('nextSlide').addEventListener('click', nextSlide);
        document.getElementById('videoModal').addEventListener('click', (e) => { if (e.target === document.getElementById('videoModal')) closeModal(); });
        document.getElementById('editModal').addEventListener('click', (e) => { if (e.target === document.getElementById('editModal')) closeEditModal(); });
        document.getElementById('adminModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('adminModal')) {
                document.getElementById('adminModal').classList.remove('active');
                document.getElementById('adminContent').style.display = 'none';
                document.getElementById('verifyAdminBtn').style.display = 'block';
                document.getElementById('adminPassword').value = '';
                isAdminLoggedIn = false;
            }
        });
        
        // Touch Slider
        const sliderContainer = document.querySelector('.slider-container');
        let startX, isDragging = false;
        if (sliderContainer) {
            sliderContainer.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; isDragging = true; });
            sliderContainer.addEventListener('touchend', (e) => {
                if (!isDragging) return;
                const diffX = e.changedTouches[0].clientX - startX;
                if (Math.abs(diffX) > 50) diffX > 0 ? prevSlide() : nextSlide();
                isDragging = false;
            });
        }
        
        // Make functions global
        window.playVideo = playVideo;
        window.closeModal = closeModal;
        window.openEditModal = openEditModal;
        window.closeEditModal = closeEditModal;
        window.deleteVideo = deleteVideo;
        window.downloadVideo = downloadVideo;
        
        // Initialize App
        async function init() {
            await seedDefaultData();  // Auto-add default data if Firestore is empty
            attachFirestoreListeners();
            renderCategories();
            updateCategoryTitle();
        }
        
        init();
        console.log('✅ VIRAL STREET with Firestore Backend Ready!');
    </script>
</body>
</html>
