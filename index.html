<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VIRAL STREET | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; font-family: 'Inter', sans-serif; color: #ffffff; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #e50914; margin-bottom: 30px; text-align: center; }
        h2, h3, h4 { color: #e50914; margin-bottom: 15px; margin-top: 20px; }
        .admin-card { background: #151515; border-radius: 16px; padding: 25px; margin-bottom: 30px; border: 1px solid rgba(229,9,20,0.3); }
        input, select, textarea { width: 100%; background: #2a2a2a; border: 1px solid #3d3d3d; border-radius: 10px; padding: 12px; color: white; margin-bottom: 12px; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #e50914; }
        button { background: #e50914; border: none; color: white; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        button:hover { opacity: 0.9; transform: scale(1.02); }
        .login-box { max-width: 400px; margin: 100px auto; text-align: center; }
        .movie-list, .slider-list { margin-top: 15px; max-height: 400px; overflow-y: auto; }
        .movie-item, .slider-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #3d3d3d; gap: 10px; flex-wrap: wrap; }
        .badges-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .badge-checkbox { display: flex; align-items: center; gap: 5px; background: #2a2a2a; padding: 5px 10px; border-radius: 6px; font-size: 12px; }
        .badge-checkbox input { width: auto; margin: 0; cursor: pointer; }
        .edit-btn { background: #3498db; border: none; color: white; padding: 5px 12px; border-radius: 6px; cursor: pointer; margin-right: 5px; }
        .delete-btn { background: rgba(229,9,20,0.3); border: 1px solid #e50914; color: #e50914; padding: 5px 12px; border-radius: 6px; cursor: pointer; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.95); color: white; padding: 12px 28px; border-radius: 40px; z-index: 4000; animation: fadeInOut 2.5s ease; border-left: 4px solid #e50914; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translateX(-50%) translateY(20px); } 15% { opacity: 1; transform: translateX(-50%) translateY(0); } 85% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(20px); } }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #151515; border-radius: 16px; padding: 25px; width: 90%; max-width: 500px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-modal { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 0; }
        .row { display: flex; gap: 12px; }
        .row > * { flex: 1; }
        @media (max-width: 768px) { .row { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginSection" class="login-box">
            <div class="admin-card">
                <h2><i class="fas fa-lock"></i> Admin Login</h2>
                <input type="password" id="adminPassword" placeholder="Enter Admin Password">
                <button id="loginBtn">Login</button>
            </div>
        </div>
        
        <div id="adminSection" style="display: none;">
            <h1><i class="fas fa-cog"></i> VIRAL STREET - Admin Panel</h1>
            
            <div class="admin-card">
                <h3><i class="fas fa-plus-circle"></i> Add New Video</h3>
                <div class="row">
                    <input type="text" id="newTitle" placeholder="Video Title *">
                    <input type="text" id="newYear" placeholder="Year *">
                </div>
                <select id="newCategory">
                    <option value="premium">🔥 Premium Free</option>
                    <option value="indian">🇮🇳 Indian Scandals</option>
                    <option value="pakistani">🇵🇰 Pakistani Scandals</option>
                    <option value="all">📺 All Videos</option>
                </select>
                <input type="text" id="newThumb" placeholder="Thumbnail URL *">
                <input type="text" id="newVideoUrl" placeholder="Video URL *">
                <input type="text" id="newDownloadUrl" placeholder="Download URL (optional)">
                <input type="number" id="newViews" placeholder="Initial Views" value="0">
                <button id="addVideoBtn">+ Add Video</button>
            </div>
            
            <div class="admin-card">
                <h3><i class="fas fa-tags"></i> Manage Videos (Status & Actions)</h3>
                <div id="adminVideoList" class="movie-list"></div>
            </div>
            
            <div class="admin-card">
                <h3><i class="fas fa-images"></i> Manage Slider Images</h3>
                <div class="row">
                    <input type="text" id="sliderImgUrl" placeholder="Slider Image URL">
                    <input type="text" id="sliderTitle" placeholder="Slider Title">
                </div>
                <textarea id="sliderDesc" rows="2" placeholder="Description"></textarea>
                <button id="addSliderBtn">+ Add Slide</button>
                <div id="sliderListAdmin" class="slider-list"></div>
            </div>
        </div>
    </div>
    
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-edit"></i> Edit Video</h3>
                <button class="close-modal" onclick="closeEditModal()">&times;</button>
            </div>
            <input type="text" id="editVideoId" style="display: none;">
            <input type="text" id="editTitle" placeholder="Video Title">
            <input type="text" id="editYear" placeholder="Year">
            <select id="editCategory">
                <option value="premium">Premium Free</option>
                <option value="indian">Indian Scandals</option>
                <option value="pakistani">Pakistani Scandals</option>
                <option value="all">All Videos</option>
            </select>
            <input type="text" id="editThumb" placeholder="Thumbnail URL">
            <input type="text" id="editVideoUrl" placeholder="Video URL">
            <input type="text" id="editDownloadUrl" placeholder="Download URL">
            <input type="number" id="editViews" placeholder="Views Count">
            <button id="saveEditBtn">💾 Save Changes</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDLloBWMeIB62CYFjxx_2DPicV9im6wFiI",
            authDomain: "viralstreet-c0128.firebaseapp.com",
            projectId: "viralstreet-c0128",
            storageBucket: "viralstreet-c0128.firebasestorage.app",
            messagingSenderId: "436825511768",
            appId: "1:436825511768:web:1456b6b669c2b00222f72d",
            measurementId: "G-N02FDH8E8W"
        };
        
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let currentVideos = [], currentSlides = [], isAdminLoggedIn = false;
        
        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = isError ? 'rgba(229,9,20,0.95)' : 'rgba(0,0,0,0.95)';
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2800);
        }
        
        function escapeHtml(text) { if (!text) return ''; const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
        function formatViews(views) { if (!views) return "0 views"; if (views >= 1e6) return (views/1e6).toFixed(1)+"M"; if (views >= 1e3) return (views/1e3).toFixed(1)+"K"; return views+" views"; }
        
        function attachListeners() {
            db.collection("viral_videos").orderBy("createdAt", "desc").onSnapshot(snapshot => {
                currentVideos = [];
                snapshot.forEach(doc => { currentVideos.push({ id: doc.id, ...doc.data() }); });
                if (isAdminLoggedIn) renderAdminVideoList();
            });
            db.collection("viral_sliders").orderBy("order", "asc").onSnapshot(snapshot => {
                currentSlides = [];
                snapshot.forEach(doc => { currentSlides.push({ id: doc.id, ...doc.data() }); });
                if (isAdminLoggedIn) renderAdminSliderList();
            });
        }
        
        async function addVideo() {
            const title = document.getElementById('newTitle').value.trim();
            const year = document.getElementById('newYear').value.trim();
            const category = document.getElementById('newCategory').value;
            const thumb = document.getElementById('newThumb').value.trim();
            const videoUrl = document.getElementById('newVideoUrl').value.trim();
            const downloadUrl = document.getElementById('newDownloadUrl').value.trim();
            const views = parseInt(document.getElementById('newViews').value) || 0;
            
            if (!title || !year || !thumb || !videoUrl) {
                showToast('Please fill all required fields!', true);
                return;
            }
            
            await db.collection("viral_videos").add({
                title, year, category, thumbnail: thumb, videoUrl, downloadUrl: downloadUrl || '', views,
                isTrending: false, isUpcoming: false, isFeatured: false,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast(`✅ "${title}" added!`);
            document.getElementById('newTitle').value = '';
            document.getElementById('newYear').value = '';
            document.getElementById('newThumb').value = '';
            document.getElementById('newVideoUrl').value = '';
            document.getElementById('newDownloadUrl').value = '';
            document.getElementById('newViews').value = '0';
        }
        
        async function updateVideoFlags(videoId, field, value) {
            await db.collection("viral_videos").doc(videoId).update({ [field]: value });
            showToast(`✅ Video ${field} updated!`);
        }
        
        async function deleteVideo(videoId) {
            if (confirm('Delete this video?')) {
                await db.collection("viral_videos").doc(videoId).delete();
                showToast('🗑️ Video deleted!');
            }
        }
        
        function openEditModal(videoId) {
            const video = currentVideos.find(v => v.id === videoId);
            if (video) {
                document.getElementById('editVideoId').value = videoId;
                document.getElementById('editTitle').value = video.title;
                document.getElementById('editYear').value = video.year;
                document.getElementById('editCategory').value = video.category;
                document.getElementById('editThumb').value = video.thumbnail;
                document.getElementById('editVideoUrl').value = video.videoUrl;
                document.getElementById('editDownloadUrl').value = video.downloadUrl || '';
                document.getElementById('editViews').value = video.views || 0;
                document.getElementById('editModal').classList.add('active');
            }
        }
        
        async function saveEditedVideo() {
            const id = document.getElementById('editVideoId').value;
            const updates = {
                title: document.getElementById('editTitle').value,
                year: document.getElementById('editYear').value,
                category: document.getElementById('editCategory').value,
                thumbnail: document.getElementById('editThumb').value,
                videoUrl: document.getElementById('editVideoUrl').value,
                downloadUrl: document.getElementById('editDownloadUrl').value || '',
                views: parseInt(document.getElementById('editViews').value) || 0
            };
            await db.collection("viral_videos").doc(id).update(updates);
            showToast('✅ Video updated!');
            closeEditModal();
        }
        
        function closeEditModal() { document.getElementById('editModal').classList.remove('active'); }
        
        async function addSlider() {
            const imgUrl = document.getElementById('sliderImgUrl').value.trim();
            const title = document.getElementById('sliderTitle').value.trim();
            const desc = document.getElementById('sliderDesc').value.trim();
            if (!imgUrl || !title || !desc) { showToast('Please fill all slider fields!', true); return; }
            const count = (await db.collection("viral_sliders").get()).size;
            await db.collection("viral_sliders").add({ imgUrl, title, desc, badge: "FEATURED", order: count, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            showToast(`✅ Slider added!`);
            document.getElementById('sliderImgUrl').value = '';
            document.getElementById('sliderTitle').value = '';
            document.getElementById('sliderDesc').value = '';
        }
        
        async function deleteSlider(sliderId) {
            if (confirm('Delete this slider?')) {
                await db.collection("viral_sliders").doc(sliderId).delete();
                showToast('Slider deleted');
            }
        }
        
        function renderAdminVideoList() {
            const container = document.getElementById('adminVideoList');
            if (!container) return;
            container.innerHTML = currentVideos.map(v => `
                <div class="movie-item">
                    <div><strong>${escapeHtml(v.title)}</strong> (${v.year}) - ${v.category} | 👁️ ${formatViews(v.views||0)}</div>
                    <div class="badges-group">
                        <label class="badge-checkbox"><input type="checkbox" ${v.isTrending ? 'checked' : ''} onchange="updateVideoFlags('${v.id}','isTrending',this.checked)"> 🔥 Trending</label>
                        <label class="badge-checkbox"><input type="checkbox" ${v.isUpcoming ? 'checked' : ''} onchange="updateVideoFlags('${v.id}','isUpcoming',this.checked)"> 📅 Upcoming</label>
                        <label class="badge-checkbox"><input type="checkbox" ${v.isFeatured ? 'checked' : ''} onchange="updateVideoFlags('${v.id}','isFeatured',this.checked)"> ⭐ Featured</label>
                        <button class="edit-btn" onclick="openEditModal('${v.id}')"><i class="fas fa-edit"></i> Edit</button>
                        <button class="delete-btn" onclick="deleteVideo('${v.id}')"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        function renderAdminSliderList() {
            const container = document.getElementById('sliderListAdmin');
            if (!container) return;
            container.innerHTML = currentSlides.map(s => `
                <div class="slider-item">
                    <span><strong>${escapeHtml(s.title)}</strong></span>
                    <button class="delete-btn" onclick="deleteSlider('${s.id}')">Delete</button>
                </div>
            `).join('');
        }
        
        function login() {
            const password = document.getElementById('adminPassword').value;
            if (password === 'admin123') {
                isAdminLoggedIn = true;
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminSection').style.display = 'block';
                attachListeners();
                showToast('✅ Admin access granted!');
            } else {
                showToast('❌ Wrong password! (Use: admin123)', true);
            }
        }
        
        document.getElementById('loginBtn').addEventListener('click', login);
        document.getElementById('addVideoBtn').addEventListener('click', addVideo);
        document.getElementById('addSliderBtn').addEventListener('click', addSlider);
        document.getElementById('saveEditBtn').addEventListener('click', saveEditedVideo);
        document.getElementById('adminPassword').addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
        
        window.updateVideoFlags = updateVideoFlags;
        window.deleteVideo = deleteVideo;
        window.openEditModal = openEditModal;
        window.deleteSlider = deleteSlider;
        window.closeEditModal = closeEditModal;
    </script>
</body>
</html>
